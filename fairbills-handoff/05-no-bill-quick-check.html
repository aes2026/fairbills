<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FairBills — No-Bill Quick Check</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F1EFE8; color: #04342C; line-height: 1.6; padding: 40px 20px; }
  .container { max-width: 560px; margin: 0 auto; background: white; border-radius: 12px; padding: 28px; }
  h2 { font-size: 22px; font-weight: 500; margin: 0 0 4px; letter-spacing: -0.3px; }
  button, input, select { font-family: inherit; cursor: pointer; }
  input, select { box-sizing: border-box; }
</style>
</head>
<body>
<div class="container">

  <!-- App chrome -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px;">
    <div style="display: flex; align-items: center; gap: 8px;">
      <div style="width: 28px; height: 28px; background: #1D9E75; border-radius: 8px; display: flex; align-items: center; justify-content: center;">
        <i class="ti ti-bolt" style="font-size: 16px; color: white;"></i>
      </div>
      <span style="font-size: 15px; font-weight: 500;">FairBills</span>
    </div>
    <div style="display: flex; align-items: center; gap: 6px; font-size: 12px; color: #888780;">
      <span>Quick check</span>
      <span>·</span>
      <span style="color: #0F6E56; font-weight: 500;">~30 sec</span>
    </div>
  </div>

  <h2>Three quick questions.</h2>
  <p style="font-size: 13px; color: #5F5E5A; margin: 0 0 22px;">We'll get you a ballpark in 30 seconds.</p>

  <!-- Q1: Postcode -->
  <div style="margin-bottom: 16px;">
    <label style="font-size: 13px; font-weight: 500; display: block; margin-bottom: 6px; color: #04342C;">1. Your postcode</label>
    <input type="text" value="2350" style="width: 100%; padding: 11px 14px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.3); font-size: 15px; background: white;" />
    <div style="font-size: 11px; color: #0F6E56; margin-top: 4px;"><i class="ti ti-check" style="font-size: 12px; vertical-align: -1px;"></i> Armidale, NSW · Essential Energy network</div>
  </div>

  <!-- Q2: Current retailer -->
  <div style="margin-bottom: 16px;">
    <label style="font-size: 13px; font-weight: 500; display: block; margin-bottom: 6px;">2. Who's your current electricity retailer?</label>
    <select style="width: 100%; padding: 11px 14px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.3); font-size: 15px; background: white;">
      <option>Origin Energy</option>
    </select>
    <div style="font-size: 11px; color: #888780; margin-top: 4px;">Not sure? Check the logo on your last bill or email.</div>
  </div>

  <!-- Q3: Household size -->
  <div style="margin-bottom: 22px;">
    <label style="font-size: 13px; font-weight: 500; display: block; margin-bottom: 6px;">3. How many people live in your home?</label>
    <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;">
      <button style="padding: 11px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.15); background: white; font-size: 14px; font-weight: 500;">1</button>
      <button style="padding: 11px; border-radius: 8px; border: 2px solid #1D9E75; background: #E1F5EE; font-size: 14px; font-weight: 500; color: #04342C;">2</button>
      <button style="padding: 11px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.15); background: white; font-size: 14px; font-weight: 500;">3</button>
      <button style="padding: 11px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.15); background: white; font-size: 14px; font-weight: 500;">4</button>
      <button style="padding: 11px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.15); background: white; font-size: 14px; font-weight: 500;">5+</button>
    </div>
  </div>

  <button style="width: 100%; background: #1D9E75; color: white; border: none; padding: 13px; border-radius: 8px; font-size: 15px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 6px;">
    Show me my estimate
    <i class="ti ti-arrow-right" style="font-size: 16px;"></i>
  </button>

  <!-- Upsell to more accuracy -->
  <div style="background: #FAEEDA; border-radius: 8px; padding: 12px 14px; margin-top: 18px; display: flex; gap: 10px; align-items: flex-start;">
    <i class="ti ti-info-circle" style="font-size: 16px; color: #854F0B; flex-shrink: 0; margin-top: 1px;"></i>
    <div>
      <div style="font-size: 12px; color: #633806; line-height: 1.5;">Got 90 more seconds? <span style="color: #185FA5; font-weight: 500; cursor: pointer;">Add solar, house size & hot water</span> for a tighter estimate.</div>
    </div>
  </div>

</div>
</body>
</html>
