<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FairBills — Upload Screen</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F1EFE8; color: #04342C; line-height: 1.6; padding: 40px 20px; }
  .container { max-width: 560px; margin: 0 auto; background: white; border-radius: 12px; padding: 28px; }
  h2 { font-size: 24px; font-weight: 500; margin: 0 0 8px; letter-spacing: -0.3px; }
  button { font-family: inherit; cursor: pointer; }
</style>
</head>
<body>
<div class="container">

  <!-- App chrome -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
    <div style="display: flex; align-items: center; gap: 8px;">
      <div style="width: 28px; height: 28px; background: #1D9E75; border-radius: 8px; display: flex; align-items: center; justify-content: center;">
        <i class="ti ti-bolt" style="font-size: 16px; color: white;"></i>
      </div>
      <span style="font-size: 15px; font-weight: 500;">FairBills</span>
    </div>
    <div style="font-size: 12px; color: #888780;">Step 1 of 3</div>
  </div>

  <h2>Drop in your power bill.</h2>
  <p style="font-size: 14px; color: #5F5E5A; margin: 0 0 24px;">PDF, photo, screenshot — we'll figure it out. Takes about 8 seconds.</p>

  <!-- Drop zone -->
  <div style="border: 1.5px dashed #1D9E75; background: #E1F5EE; border-radius: 12px; padding: 36px 24px; text-align: center; margin-bottom: 16px;">
    <div style="width: 48px; height: 48px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px;">
      <i class="ti ti-cloud-upload" style="font-size: 24px; color: #0F6E56;"></i>
    </div>
    <div style="font-size: 15px; font-weight: 500; color: #04342C; margin-bottom: 4px;">Drag your bill here</div>
    <div style="font-size: 13px; color: #0F6E56; margin-bottom: 14px;">or</div>
    <button style="background: #1D9E75; color: white; border: none; padding: 9px 20px; border-radius: 8px; font-size: 14px; font-weight: 500;">Choose a file</button>
  </div>

  <!-- Or row -->
  <div style="display: flex; align-items: center; gap: 12px; margin: 18px 0;">
    <div style="flex: 1; height: 0.5px; background: rgba(0,0,0,0.15);"></div>
    <span style="font-size: 12px; color: #888780;">no bill handy?</span>
    <div style="flex: 1; height: 0.5px; background: rgba(0,0,0,0.15);"></div>
  </div>

  <button style="width: 100%; background: white; color: #04342C; border: 0.5px solid rgba(0,0,0,0.3); padding: 11px 18px; border-radius: 8px; font-size: 14px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 8px;">
    <i class="ti ti-edit" style="font-size: 16px;"></i>
    Enter details manually instead
  </button>

  <!-- Privacy strip -->
  <div style="display: flex; gap: 18px; justify-content: center; margin-top: 22px; font-size: 12px; color: #888780;">
    <span style="display: flex; align-items: center; gap: 5px;"><i class="ti ti-lock" style="font-size: 13px;"></i> Bills processed and discarded</span>
    <span style="display: flex; align-items: center; gap: 5px;"><i class="ti ti-user-off" style="font-size: 13px;"></i> No account needed</span>
  </div>

</div>
</body>
</html>
